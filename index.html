<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Universal AI Chat</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: { extend: {} }
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  html, body { height: 100%; margin: 0; padding: 0; }
  body {
    font-family: 'Google Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overscroll-behavior: none;
  }
  #loading {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #fff; color: #333; font-size: 16px; z-index: 9999;
  }
  .dark #loading { background: #1f1f1f; color: #eee; }

  .chat-scroll::-webkit-scrollbar { width: 6px; }
  .chat-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
  .dark .chat-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); }

  .msg-md p { margin: 0.5em 0; }
  .msg-md pre {
    background: #0f172a; color: #e2e8f0;
    padding: 12px; border-radius: 8px;
    overflow-x: auto; font-size: 13px; margin: 8px 0;
  }
  .msg-md code {
    background: rgba(0,0,0,0.06);
    padding: 2px 5px; border-radius: 4px; font-size: 13px;
  }
  .dark .msg-md code { background: rgba(255,255,255,0.1); }
  .msg-md pre code { background: transparent; padding: 0; }
  .msg-md ul, .msg-md ol { padding-left: 1.5em; margin: 0.5em 0; }
  .msg-md h1, .msg-md h2, .msg-md h3 { font-weight: 600; margin: 0.6em 0 0.3em; }
  .msg-md a { color: #3b82f6; text-decoration: underline; }

  .sidebar { transition: transform 0.25s ease; }
  @media (max-width: 768px) {
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: 80%; max-width: 300px;
      z-index: 50;
      transform: translateX(-100%);
    }
    .sidebar.open { transform: translateX(0); }
  }

  .fade-in { animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .typing-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: currentColor; margin: 0 2px; opacity: 0.3;
    animation: dot 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }

  textarea { resize: none; }

  .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 0); }
</style>
</head>
<body class="bg-white dark:bg-[#1b1c1d] text-gray-900 dark:text-gray-100">

<div id="loading">Loading App...</div>

<div id="app" class="hidden flex min-h-screen w-full">

  <!-- Sidebar Overlay -->
  <div id="overlay" class="hidden fixed inset-0 bg-black/40 z-40"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar md:static md:translate-x-0 md:w-64 bg-gray-50 dark:bg-[#1b1c1d] md:border-r border-gray-200 dark:border-gray-800 flex flex-col">
    <div class="p-3 flex items-center justify-between border-b border-gray-200 dark:border-gray-800">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-500 to-purple-500"></div>
        <span class="font-semibold">AI Chat</span>
      </div>
      <button id="closeSidebar" class="md:hidden p-1 rounded hover:bg-gray-200 dark:hover:bg-gray-800">
        ✕
      </button>
    </div>

    <div class="p-3">
      <button id="newChatBtn" class="w-full flex items-center justify-center gap-2 px-4 py-2.5 rounded-full bg-blue-100 dark:bg-[#2a3942] text-blue-700 dark:text-blue-200 hover:bg-blue-200 dark:hover:bg-[#334553] font-medium transition">
        <span>+</span> New Chat
      </button>
    </div>

    <div class="px-3 py-1 text-xs font-medium text-gray-500 dark:text-gray-400 uppercase">Recent</div>
    <div id="chatList" class="flex-1 overflow-y-auto chat-scroll px-2 pb-2 space-y-1"></div>

    <div class="p-3 border-t border-gray-200 dark:border-gray-800 space-y-2">
      <button id="darkToggle" class="w-full flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-800 text-sm">
        <span id="darkIcon">🌙</span> <span id="darkLabel">Dark Mode</span>
      </button>
      <button id="settingsBtn" class="w-full flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-800 text-sm">
        ⚙️ Settings
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 flex flex-col min-w-0 min-h-screen">
    <!-- Header -->
    <header class="flex items-center justify-between px-4 py-3 border-b border-gray-200 dark:border-gray-800 bg-white dark:bg-[#1b1c1d] sticky top-0 z-10">
      <div class="flex items-center gap-2">
        <button id="openSidebar" class="md:hidden p-2 rounded hover:bg-gray-100 dark:hover:bg-gray-800">
          ☰
        </button>
        <h1 class="font-semibold text-lg bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500 bg-clip-text text-transparent">Gemini Clone</h1>
      </div>
      <button id="sysPromptBtn" class="text-sm px-3 py-1.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800" title="System Prompt">🧠</button>
    </header>

    <!-- Messages -->
    <div id="messages" class="flex-1 overflow-y-auto chat-scroll px-4 py-6 space-y-6"></div>

    <!-- Input -->
    <div class="px-3 pb-3 pt-2 safe-bottom bg-white dark:bg-[#1b1c1d]">
      <div class="max-w-3xl mx-auto">
        <div class="flex items-end gap-2 bg-gray-100 dark:bg-[#2a2b2c] rounded-3xl px-4 py-2 border border-gray-200 dark:border-gray-700 focus-within:border-blue-400">
          <textarea id="input" rows="1" placeholder="Enter a prompt here" class="flex-1 bg-transparent outline-none py-2 text-sm md:text-base max-h-40"></textarea>
          <button id="sendBtn" class="p-2 rounded-full bg-blue-500 hover:bg-blue-600 text-white disabled:opacity-40 disabled:cursor-not-allowed transition" disabled>
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
          </button>
          <button id="stopBtn" class="hidden p-2 rounded-full bg-red-500 hover:bg-red-600 text-white">■</button>
        </div>
        <p class="text-xs text-center text-gray-500 dark:text-gray-400 mt-2">AI may display inaccurate info. Verify important information.</p>
      </div>
    </div>
  </main>
</div>

<!-- Settings Modal -->
<div id="settingsModal" class="hidden fixed inset-0 bg-black/50 z-[60] flex items-center justify-center p-4">
  <div class="bg-white dark:bg-[#2a2b2c] rounded-2xl w-full max-w-md p-6 space-y-4">
    <div class="flex items-center justify-between">
      <h2 class="text-lg font-semibold">Settings</h2>
      <button id="closeSettings" class="p-1 rounded hover:bg-gray-200 dark:hover:bg-gray-700">✕</button>
    </div>
    <div>
      <label class="text-sm font-medium">OpenRouter API Key</label>
      <input id="apiKeyInput" type="password" placeholder="sk-or-..." class="w-full mt-1 px-3 py-2 rounded-lg bg-gray-100 dark:bg-[#1b1c1d] border border-gray-300 dark:border-gray-700 outline-none focus:border-blue-400" />
    </div>
    <div>
      <label class="text-sm font-medium">Model</label>
      <input id="modelInput" type="text" placeholder="deepseek/deepseek-r1:free" class="w-full mt-1 px-3 py-2 rounded-lg bg-gray-100 dark:bg-[#1b1c1d] border border-gray-300 dark:border-gray-700 outline-none focus:border-blue-400" />
    </div>
    <div class="flex justify-end gap-2 pt-2">
      <button id="cancelSettings" class="px-4 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 text-sm">Cancel</button>
      <button id="saveSettings" class="px-4 py-2 rounded-lg bg-blue-500 hover:bg-blue-600 text-white text-sm">Save</button>
    </div>
  </div>
</div>

<!-- System Prompt Modal -->
<div id="sysPromptModal" class="hidden fixed inset-0 bg-black/50 z-[60] flex items-center justify-center p-4">
  <div class="bg-white dark:bg-[#2a2b2c] rounded-2xl w-full max-w-md p-6 space-y-4">
    <div class="flex items-center justify-between">
      <h2 class="text-lg font-semibold">System Prompt</h2>
      <button id="closeSysPrompt" class="p-1 rounded hover:bg-gray-200 dark:hover:bg-gray-700">✕</button>
    </div>
    <p class="text-xs text-gray-500 dark:text-gray-400">Define how the AI should behave for this chat.</p>
    <textarea id="sysPromptInput" rows="6" placeholder="You are a helpful assistant..." class="w-full px-3 py-2 rounded-lg bg-gray-100 dark:bg-[#1b1c1d] border border-gray-300 dark:border-gray-700 outline-none focus:border-blue-400 text-sm"></textarea>
    <div class="flex justify-end gap-2">
      <button id="cancelSysPrompt" class="px-4 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 text-sm">Cancel</button>
      <button id="saveSysPrompt" class="px-4 py-2 rounded-lg bg-blue-500 hover:bg-blue-600 text-white text-sm">Save</button>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ---------- State ----------
  const LS = {
    API_KEY: 'uac_api_key',
    MODEL: 'uac_model',
    CHATS: 'uac_chats',
    ACTIVE: 'uac_active_chat',
    DARK: 'uac_dark'
  };

  let state = {
    apiKey: localStorage.getItem(LS.API_KEY) || '',
    model: localStorage.getItem(LS.MODEL) || 'deepseek/deepseek-r1:free',
    chats: [],
    activeId: null,
    dark: localStorage.getItem(LS.DARK) === '1',
    streaming: false,
    abortController: null
  };

  try {
    const raw = localStorage.getItem(LS.CHATS);
    state.chats = raw ? JSON.parse(raw) : [];
    if (!Array.isArray(state.chats)) state.chats = [];
  } catch(e) { state.chats = []; }
  state.activeId = localStorage.getItem(LS.ACTIVE) || null;

  // ---------- DOM ----------
  const $ = (id) => document.getElementById(id);
  const messagesEl = $('messages');
  const inputEl = $('input');
  const sendBtn = $('sendBtn');
  const stopBtn = $('stopBtn');
  const chatListEl = $('chatList');
  const sidebarEl = $('sidebar');
  const overlayEl = $('overlay');

  // ---------- Persistence ----------
  function saveChats() {
    try { localStorage.setItem(LS.CHATS, JSON.stringify(state.chats)); } catch(e) {}
  }
  function saveActive() {
    if (state.activeId) localStorage.setItem(LS.ACTIVE, state.activeId);
  }

  // ---------- Dark Mode ----------
  function applyDark() {
    if (state.dark) {
      document.documentElement.classList.add('dark');
      $('darkIcon').textContent = '☀️';
      $('darkLabel').textContent = 'Light Mode';
    } else {
      document.documentElement.classList.remove('dark');
      $('darkIcon').textContent = '🌙';
      $('darkLabel').textContent = 'Dark Mode';
    }
  }

  // ---------- Chats ----------
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

  function getActiveChat() {
    return state.chats.find(c => c.id === state.activeId) || null;
  }

  function createChat() {
    const chat = {
      id: uid(),
      title: 'New Chat',
      messages: [],
      systemPrompt: '',
      createdAt: Date.now()
    };
    state.chats.unshift(chat);
    state.activeId = chat.id;
    saveChats(); saveActive();
    renderChatList();
    renderMessages();
  }

  function deleteChat(id) {
    if (!confirm('Delete this chat?')) return;
    state.chats = state.chats.filter(c => c.id !== id);
    if (state.activeId === id) {
      state.activeId = state.chats[0]?.id || null;
    }
    saveChats(); saveActive();
    if (!state.activeId) createChat();
    else { renderChatList(); renderMessages(); }
  }

  function renameChat(id) {
    const chat = state.chats.find(c => c.id === id);
    if (!chat) return;
    const newTitle = prompt('Rename chat:', chat.title);
    if (newTitle && newTitle.trim()) {
      chat.title = newTitle.trim();
      saveChats();
      renderChatList();
    }
  }

  function selectChat(id) {
    state.activeId = id;
    saveActive();
    renderChatList();
    renderMessages();
    closeSidebar();
  }

  // ---------- Render ----------
  function renderChatList() {
    chatListEl.innerHTML = '';
    state.chats.forEach(chat => {
      const item = document.createElement('div');
      item.className = 'group flex items-center gap-1 px-2 py-2 rounded-lg cursor-pointer text-sm ' +
        (chat.id === state.activeId ? 'bg-blue-100 dark:bg-[#2a3942] text-blue-700 dark:text-blue-200' : 'hover:bg-gray-200 dark:hover:bg-gray-800');
      
      const title = document.createElement('div');
      title.className = 'flex-1 truncate';
      title.textContent = chat.title || 'Untitled';
      title.onclick = () => selectChat(chat.id);

      const renameBtn = document.createElement('button');
      renameBtn.className = 'opacity-0 group-hover:opacity-100 p-1 rounded hover:bg-gray-300 dark:hover:bg-gray-700 text-xs';
      renameBtn.textContent = '✏️';
      renameBtn.onclick = (e) => { e.stopPropagation(); renameChat(chat.id); };

      const delBtn = document.createElement('button');
      delBtn.className = 'opacity-0 group-hover:opacity-100 p-1 rounded hover:bg-gray-300 dark:hover:bg-gray-700 text-xs';
      delBtn.textContent = '🗑️';
      delBtn.onclick = (e) => { e.stopPropagation(); deleteChat(chat.id); };

      item.appendChild(title);
      item.appendChild(renameBtn);
      item.appendChild(delBtn);
      chatListEl.appendChild(item);
    });
  }

  function renderMessages() {
    messagesEl.innerHTML = '';
    const chat = getActiveChat();
    if (!chat) return;

    if (chat.messages.length === 0) {
      const welcome = document.createElement('div');
      welcome.className = 'max-w-3xl mx-auto text-center py-12';
      welcome.innerHTML = `
        <h2 class="text-3xl md:text-5xl font-semibold bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500 bg-clip-text text-transparent mb-2">Hello there</h2>
        <p class="text-xl md:text-2xl text-gray-500 dark:text-gray-400">How can I help you today?</p>
      `;
      messagesEl.appendChild(welcome);
      return;
    }

    chat.messages.forEach(m => appendMessageDOM(m));
    scrollToBottom();
  }

  function appendMessageDOM(m) {
    const wrap = document.createElement('div');
    wrap.className = 'max-w-3xl mx-auto w-full fade-in flex ' + (m.role === 'user' ? 'justify-end' : 'justify-start');

    const bubble = document.createElement('div');
    bubble.className = m.role === 'user'
      ? 'max-w-[85%] bg-blue-500 text-white rounded-2xl rounded-br-md px-4 py-2.5 text-sm md:text-base'
      : 'max-w-[92%] md:max-w-[85%] flex gap-3 items-start';

    if (m.role === 'user') {
      bubble.textContent = m.content;
    } else {
      const avatar = document.createElement('div');
      avatar.className = 'w-8 h-8 rounded-full bg-gradient-to-br from-blue-500 to-purple-500 flex-shrink-0 mt-1';

      const content = document.createElement('div');
      content.className = 'msg-md flex-1 min-w-0 text-sm md:text-base';
      content.dataset.role = 'ai-content';
      content.innerHTML = renderMarkdown(m.content || '');

      bubble.appendChild(avatar);
      bubble.appendChild(content);
    }

    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    return wrap;
  }

  function renderMarkdown(text) {
    try {
      if (window.marked) {
        return marked.parse(text, { breaks: true, gfm: true });
      }
    } catch(e) {}
    return escapeHtml(text).replace(/\n/g, '<br>');
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ---------- Send ----------
  async function sendMessage() {
    if (state.streaming) return;
    const text = inputEl.value.trim();
    if (!text) return;

    if (!state.apiKey) {
      alert('Please set your OpenRouter API key in Settings.');
      openSettings();
      return;
    }

    let chat = getActiveChat();
    if (!chat) { createChat(); chat = getActiveChat(); }

    const userMsg = { role: 'user', content: text };
    chat.messages.push(userMsg);

    if (chat.title === 'New Chat') {
      chat.title = text.slice(0, 40) + (text.length > 40 ? '...' : '');
    }

    inputEl.value = '';
    autoResize();
    saveChats();
    renderChatList();

    // Re-render to include user message
    if (chat.messages.length === 1) renderMessages();
    else appendMessageDOM(userMsg);
    scrollToBottom();

    // Prepare assistant message
    const aiMsg = { role: 'assistant', content: '' };
    chat.messages.push(aiMsg);
    const aiWrap = appendMessageDOM(aiMsg);
    const aiContentEl = aiWrap.querySelector('[data-role="ai-content"]');
    aiContentEl.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
    scrollToBottom();

    // Build messages
    const apiMessages = [];
    if (chat.systemPrompt && chat.systemPrompt.trim()) {
      apiMessages.push({ role: 'system', content: chat.systemPrompt });
    }
    chat.messages.slice(0, -1).forEach(m => {
      apiMessages.push({ role: m.role, content: m.content });
    });

    state.streaming = true;
    sendBtn.classList.add('hidden');
    stopBtn.classList.remove('hidden');
    state.abortController = new AbortController();

    try {
      const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + state.apiKey,
          'Content-Type': 'application/json',
          'HTTP-Referer': window.location.href,
          'X-Title': 'Universal AI Chat'
        },
        body: JSON.stringify({
          model: state.model,
          messages: apiMessages,
          stream: true
        }),
        signal: state.abortController.signal
      });

      if (!res.ok) {
        const errText = await res.text();
        throw new Error('API Error ' + res.status + ': ' + errText);
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let accumulated = '';
      let firstToken = true;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed || !trimmed.startsWith('data:')) continue;
          const data = trimmed.slice(5).trim();
          if (data === '[DONE]') continue;
          try {
            const json = JSON.parse(data);
            const delta = json.choices?.[0]?.delta?.content || '';
            if (delta) {
              if (firstToken) { aiContentEl.innerHTML = ''; firstToken = false; }
              accumulated += delta;
              aiMsg.content = accumulated;
              aiContentEl.innerHTML = renderMarkdown(accumulated);
              scrollToBottom();
            }
          } catch(e) { /* ignore parse errors */ }
        }
      }

      if (firstToken) {
        aiContentEl.innerHTML = '<em class="text-gray-500">No response.</em>';
      }

    } catch(err) {
      if (err.name === 'AbortError') {
        aiContentEl.innerHTML = renderMarkdown(aiMsg.content || '') + '<p class="text-xs text-gray-500 mt-2">⏹ Stopped</p>';
      } else {
        aiMsg.content = '❌ ' + (err.message || 'Error occurred');
        aiContentEl.innerHTML = renderMarkdown(aiMsg.content);
      }
    } finally {
      state.streaming = false;
      state.abortController = null;
      sendBtn.classList.remove('hidden');
      stopBtn.classList.add('hidden');
      saveChats();
      updateSendBtn();
    }
  }

  function stopStream() {
    if (state.abortController) state.abortController.abort();
  }

  // ----------
