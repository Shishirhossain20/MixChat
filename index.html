<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Universal AI Chat Interface</title>
  <meta name="description" content="Google Gemini–style AI Chat Interface using OpenRouter API">

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- marked.js for Markdown via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Tailwind config for our custom colors -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'gemini-bg': 'var(--bg-color)',
            'gemini-surface': 'var(--surface-color)',
            'gemini-primary': '#10a37f',
            'gemini-primary-light': '#15b78f',
            'gemini-border': 'var(--border-color)',
          }
        }
      }
    }
  </script>

  <style>
    :root {
      --bg-color: #f7f7f7;
      --surface-color: #ffffff;
      --border-color: #e0e0e0;
      --text-primary: #1a1a1a;
      --text-secondary: #5f6368;
      --text-on-dark: #f0f0f0;
    }

    .dark {
      --bg-color: #121212;
      --surface-color: #1f1f1f;
      --border-color: #333333;
      --text-primary: #e0e0e0;
      --text-secondary: #b3b3b3;
    }

    html, body {
      height: 100%;
      min-height: 100vh;
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #app {
      height: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #sidebar {
      transition: transform 0.3s ease-in-out;
    }

    #sidebar.mobile-hide {
      transform: translateX(-100%);
    }

    #sidebar.mobile-show {
      transform: translateX(0%);
    }

    #messages-container {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    #messages {
      padding: 1rem;
      min-height: 100%;
    }

    .markdown-content {
      line-height: 1.5;
    }

    .markdown-content p {
      margin-bottom: 0.5rem;
    }

    .markdown-content pre {
      background-color: rgba(0, 0, 0, 0.05);
      padding: 0.75rem;
      border-radius: 0.5rem;
      overflow-x: auto;
    }

    .markdown-content code {
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
      font-size: 0.875rem;
    }

    .markdown-content pre code {
      font-size: 0.875rem;
      padding: 0;
      background-color: transparent;
    }

    @media (prefers-color-scheme: dark) {
      body {
        --bg-color: #121212;
        --surface-color: #1f1f1f;
        --border-color: #333333;
        --text-primary: #e0e0e0;
        --text-secondary: #b3b3b3;
      }
    }

    .typing {
      opacity: 0;
      animation: blink 1.4s step-start infinite;
    }

    @keyframes blink {
      0% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 0; }
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-gemini-bg text-gray-800">
  <!-- Loading indicator (shown until JS initializes) -->
  <div id="loading" class="fixed inset-0 flex items-center justify-center bg-white z-50">
    <div class="text-center">
      <div class="animate-spin rounded-full h-12 w-12 border-4 border-gemini-primary border-t-transparent mx-auto"></div>
      <p class="mt-4 text-lg text-gray-600">Loading App...</p>
    </div>
  </div>

  <div id="app" class="flex flex-col h-full">
    <!-- Header -->
    <header class="bg-gemini-surface border-b border-gemini-border px-4 py-3 flex items-center justify-between">
      <div class="flex items-center">
        <!-- Hamburger for mobile sidebar -->
        <button id="toggle-sidebar" class="md:hidden mr-3 p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600 dark:text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        <h1 class="text-xl font-semibold text-gemini-primary">Universal AI Chat</h1>
      </div>
      <div class="flex items-center space-x-3">
        <!-- Dark mode toggle -->
        <button id="dark-mode-toggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-600 dark:text-gray-300 sun-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
          </svg>
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-600 dark:text-gray-300 hidden moon-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
          </svg>
        </button>
        <!-- Settings button -->
        <button id="open-settings" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-600 dark:text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
        </button>
      </div>
    </header>

    <!-- Main content -->
    <main class="flex flex-1 overflow-hidden no-scrollbar">
      <!-- Sidebar -->
      <aside id="sidebar" class="bg-gemini-surface border-r border-gemini-border w-64 md:w-72 flex-shrink-0 flex flex-col">
        <div class="p-4 border-b border-gemini-border">
          <button id="new-chat" class="w-full bg-gemini-primary text-white py-2 px-4 rounded-lg hover:bg-gemini-primary-light transition-colors flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
            New Chat
          </button>
        </div>
        <div id="chat-list" class="flex-1 overflow-y-auto no-scrollbar p-2">
          <!-- Chat items will be added here -->
        </div>
      </aside>

      <!-- Chat area -->
      <div class="flex-1 flex flex-col">
        <!-- Messages container -->
        <div id="messages-container" class="flex-1 overflow-y-auto no-scrollbar">
          <div id="messages" class="max-w-4xl mx-auto">
            <!-- Empty state -->
            <div id="empty-state" class="flex flex-col items-center justify-center h-full text-center p-8">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-gray-400 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z" />
              </svg>
              <h2 class="text-xl font-semibold mb-2">Start a conversation</h2>
              <p class="text-gray-500">Ask me anything or share your ideas</p>
            </div>
            <!-- Messages will be added here -->
          </div>
        </div>

        <!-- Input area -->
        <div class="bg-gemini-surface border-t border-gemini-border p-4 sticky bottom-0">
          <form id="chat-form" class="flex items-start space-x-2">
            <div class="flex-1 relative">
              <textarea
                id="message-input"
                class="w-full px-4 py-3 rounded-lg border border-gemini-border bg-white dark:bg-gray-800 dark:border-gray-700 resize-none focus:outline-none focus:ring-2 focus:ring-gemini-primary-light focus:border-transparent transition-colors"
                placeholder="Message Gemini..."
                rows="1"
                maxlength="10000"
              ></textarea>
              <div class="text-xs text-gray-400 mt-1 text-right">
                <span id="char-count">0</span>/10000
              </div>
            </div>
            <div class="flex flex-col space-y-2">
              <button
                type="submit"
                id="send-button"
                class="bg-gemini-primary text-white p-3 rounded-lg hover:bg-gemini-primary-light transition-colors focus:outline-none focus:ring-2 focus:ring-gemini-primary-light focus:ring-offset-2"
                disabled
              >
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                </svg>
              </button>
              <button
                type="button"
                id="stop-button"
                class="bg-red-500 text-white p-3 rounded-lg hover:bg-red-600 transition-colors focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2 hidden"
              >
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z" />
                </svg>
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <!-- Settings modal -->
  <div id="settings-modal" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden flex items-center justify-center">
    <div class="bg-gemini-surface rounded-lg shadow-xl w-full max-w-md mx-4">
      <div class="p-6">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-xl font-semibold">Settings</h2>
          <button id="close-settings" class="text-gray-500 hover:text-gray-700 focus:outline-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>

        <form id="settings-form">
          <div class="mb-4">
            <label for="api-key" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
